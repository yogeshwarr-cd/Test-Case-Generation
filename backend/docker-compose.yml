services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testcase_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testcase_generator"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["redis_data:/data"]
  testcase-backend:
    build: .
    ports: ["8003:8003"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/testcase_generator
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
volumes:
  postgres_data:
  redis_data:
