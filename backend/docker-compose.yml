services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testcase_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testcase_generator"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  testcase-backend:
    build: .
    ports: ["8001:8001"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/testcase_generator
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
